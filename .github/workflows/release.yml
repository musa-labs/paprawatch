name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run Tests
        run: go test -v ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=paprawatch
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=paprawatch.exe
          fi
          go build -o dist/${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paprawatch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -exec cp {} release_assets/ \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
